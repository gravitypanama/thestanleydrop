<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="" />
    <meta name="author" content="" />
    <title>thestanleydrop | Hidratación con estilo</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="css/main.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body>    

    <section id="filters" class="py-3 mb-4 border-bottom">
        <div class="container">
            <div class="row align-items-center">
    
                <div class="col-lg-3 mb-3 mb-lg-0">
                    <label class="form-label" style="font-size: 0.9rem; color: #666;">Tipo de producto</label>
                    <select id="filterTipo" class="form-select" style="border: 1px solid #ddd; font-size: 0.95rem;">
                        <option value="Todos" selected>Todos</option>
                    </select>
                </div>

                <div class="col-lg-3 mb-3 mb-lg-0">
                    <label class="form-label" style="font-size: 0.9rem; color: #666;">Tamaño (oz)</label>
                    <select id="filterTamano" class="form-select" style="border: 1px solid #ddd; font-size: 0.95rem;">
                        <option value="Todos" selected>Todos</option>
                    </select>
                </div>
    
                <div class="col-lg-3 mb-3 mb-lg-0">
                    <label class="form-label" style="font-size: 0.9rem; color: #666;">Uso</label>
                    <select id="filterUso" class="form-select" style="border: 1px solid #ddd; font-size: 0.95rem;">
                        <option value="Todos" selected>Todos</option>
                    </select>
                </div>
    
                <div class="col-lg-3 mb-3 mb-lg-0">
                    <label class="form-label" style="font-size: 0.9rem; color: #666;">&nbsp;</label>
                    <button id="btnLimpiar" class="btn btn-sm w-100" style="background-color: transparent; border: 1px solid #ddd; color: #666; font-size: 0.9rem;">
                        <i class="bi bi-x-circle me-1"></i>Limpiar
                    </button>
                </div>
    
            </div>
        </div>
    </section>

    <section id="catalog"></section>
    
    <button id="btnScrollTop" class="btn btn-space" title="Ir al inicio">
        <i class="bi bi-arrow-up"></i>
    </button>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
